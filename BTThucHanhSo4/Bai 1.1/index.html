<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Quản lý điểm sinh viên</h2>

    <div class="input-group">
        <input type="text" id="txtName" placeholder="Nhập họ tên...">
        <input type="number" id="txtScore" placeholder="Điểm (0-10)" min="0" max="10" step="0.1">
        <button id="btnAdd">Thêm</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            </tbody>
    </table>

    <div class="summary" id="summaryArea">
        Tổng số: 0 | Điểm trung bình: 0
    </div>

    <script src="script.js"></script>
</body>
</html>
