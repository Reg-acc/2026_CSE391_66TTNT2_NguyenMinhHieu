<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
    <form id="registerForm">
        <h2>Đăng Ký Tài Khoản</h2>
        
        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" id="fullname" placeholder="Nhập họ và tên">
            <span class="error" id="fullnameError"></span>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="name@domain.com">
            <span class="error" id="emailError"></span>
        </div>

        <div class="form-group">
            <label>Số điện thoại</label>
            <input type="text" id="phone" placeholder="0xxxxxxxxx">
            <span class="error" id="phoneError"></span>
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Tối thiểu 8 ký tự, 1 hoa, 1 thường, 1 số">
            <span class="error" id="passwordError"></span>
        </div>

        <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
            <span class="error" id="confirmPasswordError"></span>
        </div>

        <div class="form-group">
            <label>Giới tính</label>
            <div class="radio-group">
                <input type="radio" name="gender" value="Nam" id="male"> Nam
                <input type="radio" name="gender" value="Nữ" id="female"> Nữ
            </div>
            <span class="error" id="genderError"></span>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" id="terms"> Tôi đồng ý với điều khoản
            </label>
            <span class="error" id="termsError"></span>
        </div>

        <button type="submit">Đăng Ký</button>
    </form>

    <div id="successMsg" class="hidden">
        <h2>Đăng ký thành công! 🎉</h2>
        <p>Chào mừng, <span id="displayUsername"></span>!</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
